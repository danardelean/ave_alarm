title: AVE Alarm
views:
  - title: Alarm Control
    path: alarm
    icon: mdi:shield-home
    cards:
      # ── Global Alarm Control ──
      - type: alarm-panel
        entity: alarm_control_panel.ave_alarm
        name: AVE Alarm
        states:
          - arm_away

      # ── Per-Area Controls ──
      - type: horizontal-stack
        cards:
          - type: alarm-panel
            entity: alarm_control_panel.giardino
            name: Giardino
            states:
              - arm_away
          - type: alarm-panel
            entity: alarm_control_panel.cortile
            name: Cortile
            states:
              - arm_away
          - type: alarm-panel
            entity: alarm_control_panel.garage
            name: Garage
            states:
              - arm_away

      # ── System Status ──
      - type: entities
        title: System Status
        icon: mdi:information-outline
        entities:
          - entity: sensor.alarm_power
            name: Mains Power
            icon: mdi:power-plug
          - entity: sensor.alarm_battery
            name: Battery
          - entity: sensor.alarm_gsm
            name: GSM Provider
          - entity: sensor.alarm_cloud
            name: Cloud Connection
          - entity: sensor.alarm_wifi
            name: WiFi

      # ── Battery Gauge ──
      - type: gauge
        entity: sensor.alarm_battery
        name: Battery
        min: 0
        max: 100
        severity:
          green: 60
          yellow: 30
          red: 10
